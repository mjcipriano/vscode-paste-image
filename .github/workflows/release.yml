name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package, for example v1.0.4-internal.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Version, Build, and Attach VSIX
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref != 'refs/heads/master' || !startsWith(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Prepare release metadata
        id: release
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [ "$GITHUB_REF" = "refs/heads/master" ]; then
            node .github/scripts/prepare-release.js
          else
            release_tag="${DISPATCH_TAG:-$GITHUB_REF_NAME}"
            package_version="$(node -p "require('./package.json').version")"
            tag_version="${release_tag#v}"

            if [ "$tag_version" != "$package_version" ]; then
              echo "Tag $release_tag does not match package version $package_version." >&2
              exit 1
            fi

            echo "mode=existing" >> "$GITHUB_OUTPUT"
            echo "version=$package_version" >> "$GITHUB_OUTPUT"
            echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
            echo "vsix=paste-image-internal-$package_version.vsix" >> "$GITHUB_OUTPUT"
          fi

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npm run package:vsix

      - name: Verify VSIX exists
        run: test -f "${{ steps.release.outputs.vsix }}"

      - name: Commit version bump and push tag
        if: steps.release.outputs.mode == 'auto'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json README.md
          git commit -m "chore(release): ${{ steps.release.outputs.tag }} [skip ci]"
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.tag }}"
          git push origin HEAD:master "${{ steps.release.outputs.tag }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_notes="$(mktemp)"
          printf '%s\n' \
            'Automated VSIX release.' \
            '' \
            'Build verification:' \
            '- npm test' \
            '- npm run package:vsix' > "$release_notes"

          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.release.outputs.tag }}" "${{ steps.release.outputs.vsix }}" --clobber
          else
            gh release create "${{ steps.release.outputs.tag }}" "${{ steps.release.outputs.vsix }}" \
              --title "${{ steps.release.outputs.tag }}" \
              --notes-file "$release_notes" \
              --verify-tag
          fi
