name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package, for example v1.0.4-internal.2
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Build and Attach VSIX
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Validate tag version
        id: package
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${RELEASE_TAG#v}"

          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag $RELEASE_TAG does not match package version $package_version." >&2
            exit 1
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "vsix=paste-image-internal-$package_version.vsix" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: npm test

      - name: Package VSIX
        run: npx --yes vsce package

      - name: Verify VSIX exists
        run: test -f "${{ steps.package.outputs.vsix }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_notes="$(mktemp)"
          printf '%s\n' \
            'Automated VSIX release.' \
            '' \
            'Build verification:' \
            '- npm test' \
            '- npx --yes vsce package' > "$release_notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${{ steps.package.outputs.vsix }}" --clobber
          else
            gh release create "$RELEASE_TAG" "${{ steps.package.outputs.vsix }}" \
              --title "$RELEASE_TAG" \
              --notes-file "$release_notes" \
              --verify-tag
          fi
